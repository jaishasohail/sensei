// Top-level build file where you can add configuration options common to all sub-projects/modules.

buildscript {
  repositories {
    google()
    mavenCentral()
  }
  dependencies {
    classpath('com.android.tools.build:gradle')
    classpath('com.facebook.react:react-native-gradle-plugin')
    classpath('org.jetbrains.kotlin:kotlin-gradle-plugin')
  }
}

allprojects {
  repositories {
    google()
    mavenCentral()
    maven { url 'https://www.jitpack.io' }
  }
}

apply plugin: "expo-root-project"
apply plugin: "com.facebook.react.rootproject"

// ── SDK 35 override ──────────────────────────────────────────────────────────
// android-36 + JDK 21 breaks JdkImageTransform (--patch-module=java.base error).
// Android SDK 35 (Android 15, stable) is fully compatible with JDK 17 & 21.
// These assignments run AFTER expo-root-project sets them, so they win.
rootProject.ext.compileSdkVersion = 35
rootProject.ext.targetSdkVersion  = 35
rootProject.ext.buildToolsVersion = "35.0.0"
